<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travels — Trip Journal</title>
<style>
  :root{
    --sand:#F5EDE4;
    --cream:#FFFAF5;
    --ink:#2B2520;
    --muted:#7A6F68;
    --line:#E8DDD3;
    --accent:#D97757;
    --accent-soft:#F4E7DF;
    --date:#8B5A3C;
    --date-soft:#F3E8DD;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --serif:"Iowan Old Style",Palatino,"Palatino Linotype",Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--sand);color:var(--ink);
    font-family:var(--sans);font-size:14.5px;line-height:1.55;
  }
  mark{background:#F3E4A8;color:inherit;border-radius:2px;padding:0 1px}

  header{
    position:sticky;top:0;z-index:10;
    background:var(--sand);border-bottom:1px solid var(--line);
    padding:14px 22px 12px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .brand{display:flex;flex-direction:column;min-width:150px}
  .brand h1{font-family:var(--serif);font-size:21px;font-weight:600;letter-spacing:.01em}
  .brand span{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .searchwrap{flex:1;min-width:220px;max-width:460px;position:relative}
  .searchwrap input{
    width:100%;padding:9px 12px 9px 34px;
    border:1px solid var(--line);border-radius:8px;background:var(--cream);
    font:inherit;color:var(--ink);outline:none;
  }
  .searchwrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .searchwrap .icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px}
  .loadbtn{
    border:1px solid var(--accent);background:var(--accent);color:#fff;
    border-radius:8px;padding:8px 14px;font-size:13.5px;font-weight:600;
  }
  .loadbtn:hover{filter:brightness(1.08)}
  .chips{display:flex;gap:6px;flex-wrap:wrap;width:100%;padding-top:2px}
  .chip{
    border:1px solid var(--line);background:var(--cream);color:var(--muted);
    border-radius:999px;padding:3px 11px;font-size:12px;
  }
  .chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}
  .chip:focus-visible,.loadbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .layout{display:flex;min-height:calc(100vh - 92px)}
  nav{
    width:240px;flex-shrink:0;border-right:1px solid var(--line);
    padding:16px 12px;position:sticky;top:92px;align-self:flex-start;
    max-height:calc(100vh - 92px);overflow-y:auto;
  }
  nav .navlabel{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 8px 8px}
  .navitem{
    display:block;width:100%;text-align:left;
    background:none;border:none;border-radius:8px;
    padding:8px 10px;margin-bottom:2px;color:var(--ink);
  }
  .navitem:hover{background:var(--cream)}
  .navitem.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .navitem small{display:block;font-family:var(--mono);font-size:10.5px;color:var(--muted);font-weight:400}
  main{flex:1;padding:22px;max-width:1200px}

  .tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:12px}
  .tab{
    background:none;border:none;cursor:pointer;padding:8px 12px;
    font-family:var(--mono);font-size:12px;letter-spacing:.05em;
    color:var(--muted);border-bottom:2px solid transparent;font-weight:600;
  }
  .tab.on{color:var(--accent);border-bottom-color:var(--accent)}

  .trip{
    background:var(--cream);border:1px solid var(--line);border-radius:12px;
    margin-bottom:18px;overflow:hidden;border-left:4px solid var(--accent);
  }
  .trip-head{padding:16px 18px 10px}
  .trip-head h2{font-family:var(--serif);font-size:20px;font-weight:600}
  .trip-dates{
    display:flex;gap:8px;flex-wrap:wrap;padding:8px 18px 6px;
    font-family:var(--mono);font-size:11.5px;
    background:var(--date-soft);color:var(--date);border-radius:6px;margin:6px 18px 0;
    width:fit-content;
  }
  .trip-dates span{background:rgba(255,255,255,.5);padding:2px 8px;border-radius:4px}
  .trip-body{padding:8px 18px 16px}
  .trip-section{margin:12px 0;padding:10px 0;border-top:1px solid var(--line)}
  .trip-section:first-child{border-top:none;padding-top:0}
  .section-title{font-weight:700;font-size:12.5px;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
  .location{
    background:var(--sand);border-left:3px solid var(--accent);
    padding:8px 12px;margin:6px 0;border-radius:4px;font-size:13.5px;
  }
  .location strong{color:var(--accent);font-weight:700}
  ul.items{list-style:none;margin:4px 0}
  ul.items li{padding:2px 0;margin-left:0}
  ul.items li::before{content:"◦ ";color:var(--muted);margin-right:6px}

  .mapcanvas{
    width:100%;height:400px;border:1px solid var(--line);border-radius:12px;
    background:var(--cream);margin-bottom:20px;position:relative;
  }
  .mapcanvas svg{width:100%;height:100%}
  .place-marker{fill:var(--accent);opacity:.8;cursor:pointer;transition:opacity .2s}
  .place-marker:hover{opacity:1;r:8}
  .place-label{font-family:var(--sans);font-size:10px;fill:var(--ink);pointer-events:none;text-anchor:middle}

  .stats{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px;
  }
  .stat{
    background:var(--cream);border:1px solid var(--line);border-radius:8px;
    padding:14px;text-align:center;
  }
  .stat-num{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--accent)}
  .stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.05em;text-transform:uppercase}

  .timeline{margin:0;padding:0;list-style:none;position:relative;padding-left:30px}
  .timeline::before{
    content:"";position:absolute;left:12px;top:0;bottom:0;width:2px;background:var(--line);
  }
  .timeline li{
    margin-bottom:20px;position:relative;
  }
  .timeline li::before{
    content:"";position:absolute;left:-24px;top:4px;width:10px;height:10px;
    background:var(--accent);border:2px solid var(--sand);border-radius:50%;
  }
  .timeline-date{
    font-family:var(--mono);font-size:11px;color:var(--date);font-weight:700;
  }
  .timeline-item{
    font-size:13.5px;margin-top:2px;
  }

  .empty{
    border:1.5px dashed var(--line);border-radius:12px;padding:60px 30px;
    text-align:center;color:var(--muted);background:var(--cream);
  }
  .empty h3{font-family:var(--serif);color:var(--ink);font-size:19px;margin-bottom:8px}
  .count{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-bottom:14px}
  body.dragging::after{
    content:"Drop .md trip files to load";position:fixed;inset:0;z-index:50;
    display:flex;align-items:center;justify-content:center;
    background:rgba(217,119,87,.9);color:#fff;font-family:var(--serif);font-size:26px;
  }
  @media (max-width:760px){
    nav{display:none}
    main{padding:14px}
    header{padding:12px 14px}
    .mapcanvas{height:300px}
    .stats{grid-template-columns:repeat(2,1fr)}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Travels</h1>
    <span>trip journal</span>
  </div>
  <div class="searchwrap">
    <span class="icon">⌕</span>
    <input id="search" type="search" placeholder="Search trips, places, dates, people…">
  </div>
  <button class="loadbtn" id="loadBtn">Load trip files</button>
  <input type="file" id="fileInput" accept=".md,.markdown,.txt" multiple hidden>
</header>

<div class="layout">
  <nav aria-label="Trips">
    <div class="navlabel">Trips</div>
    <div id="navList"></div>
  </nav>
  <main>
    <div class="tabs">
      <button class="tab on" data-view="map">Map</button>
      <button class="tab" data-view="timeline">Timeline</button>
      <button class="tab" data-view="trips">Trips</button>
    </div>
    <div class="count" id="count"></div>
    <div id="content"></div>
  </main>
</div>

<script>
/* ================= data ================= */
let trips = [];
let activeCohort = null;
let query = "";
let currentView = "map";

function parseTrip(text, sourceName){
  const lines = text.split(/\r?\n/);
  let trip = null;
  const trips_out = [];

  for (let i = 0; i < lines.length; i++){
    const line = lines[i];
    const titleMatch = line.match(/^#\s+(.+)$/);
    if (titleMatch){
      if (trip) trips_out.push(trip);
      trip = {
        name: titleMatch[1].trim(),
        source: sourceName,
        details: {},
        sections: {},
        allText: text.toLowerCase(),
        fullContent: []
      };
      continue;
    }
    if (!trip) continue;

    // Capture any line that's not empty and not a heading
    if (line.trim() && !line.match(/^#/)){
      trip.fullContent.push(line.trim());
      // Also extract bold key-value pairs at first level
      const bulletMatch = line.match(/^-\s+(.*)$/);
      if (bulletMatch){
        const content = bulletMatch[1].trim();
        const boldMatch = content.match(/^\*\*([^*]+)\*\*:?\s*(.*)$/);
        if (boldMatch){
          const key = boldMatch[1].trim().toLowerCase();
          const val = boldMatch[2].trim();
          trip.details[key] = val;
        }
      }
    }
  }
  if (trip) trips_out.push(trip);
  return trips_out;
}

function extractDates(trip){
  const dates = [];
  const text = trip.name + " " + trip.fullContent.join(" ");
  const patterns = [
    /(\w+\s+\d{1,2})-(\d{1,2},?\s+\d{4})/g,
    /(\w+\s+\d{1,2},?\s+\d{4})/g,
  ];
  const seen = new Set();
  for (const re of patterns){
    let m;
    while ((m = re.exec(text))){
      const val = m[0].trim();
      if (!seen.has(val.toLowerCase())){ seen.add(val.toLowerCase()); dates.push(val); }
    }
  }
  return dates.slice(0, 2);
}

function extractLocations(trip){
  const locs = [];
  const fullText = [trip.name, ...trip.fullContent].join(" ");
  
  // Look for "City, Country" pattern where neither is a month name
  const months = /January|February|March|April|May|June|July|August|September|October|November|December/i;
  const cityCountry = /\b([A-Z][a-z]+(?:\s+[A-Z][a-z]+)*),\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)*)\b/g;
  const seen = new Set();
  let m;
  while ((m = cityCountry.exec(fullText))){
    const city = m[1].trim();
    const country = m[2].trim();
    // Reject matches where either part is a person name or month
    if (months.test(country) || /^(Sarah|Alex|With|Alone|Dates)$/i.test(city)) continue;
    const full = city + ", " + country;
    if (!seen.has(full)){ seen.add(full); locs.push({name: full, raw: m[0]}); }
  }
  return locs;
}

function extractPeople(trip){
  const names = new Set();
  const text = Object.values(trip.details).join(" ");
  const patterns = [
    /(?:with|met|visited):?\s+([A-Z][a-z]+(?:\s+(?:and|,)\s+[A-Z][a-z]+)*)/g,
    /\b([A-Z][a-z]{2,})\b(?:\s+\(|,|\s+and|\s+was)/g
  ];
  for (const re of patterns){
    let m;
    while ((m = re.exec(text))){
      m[1].split(/\s+and\s+|,\s+/).forEach(n=>{
        const clean = n.replace(/[()]/g,"").trim();
        if (/^[A-Z][a-z]+$/.test(clean)) names.add(clean);
      });
    }
  }
  return [...names];
}

const EARTH_COORDS = {
  "Singapore": [1.3521, 103.8198],
  "Bali": [-8.6705, 115.2126],
  "Bangkok": [13.7563, 100.5018],
  "Hong Kong": [22.3193, 114.1694],
  "Tokyo": [35.6762, 139.6503],
  "Sydney": [-33.8688, 151.2093],
  "London": [51.5074, -0.1278],
  "New York": [40.7128, -74.0060],
  "Paris": [48.8566, 2.3522],
  "Dubai": [25.2048, 55.2708],
  "Bangkok": [13.7563, 100.5018],
  "Chiang Mai": [18.7883, 98.9853],
  "Phuket": [7.8804, 98.3923],
};

function geoCoords(location){
  const search = location.split(",")[0].trim();
  return EARTH_COORDS[search] || null;
}

/* ================= rendering ================= */
const esc = s => s.replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function inline(s){
  let h = esc(s);
  if (query){
    const re = new RegExp("("+query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
    h = h.replace(re,"<mark>$1</mark>");
  }
  return h;
}
const matches = t => !query || t.toLowerCase().includes(query.toLowerCase());

function render(){
  const nav = document.getElementById("navList");
  const content = document.getElementById("content");
  const countEl = document.getElementById("count");

  nav.innerHTML =
    `<button class="navitem ${!activeCohort?'active':''}" data-trip="">All trips<small>${trips.length} total</small></button>` +
    trips.map(t=>{
      const dates = extractDates(t);
      return `<button class="navitem ${activeCohort===t.name?'active':''}" data-trip="${esc(t.name)}">${esc(t.name)}<small>${esc(dates[0]||'')}</small></button>`;
    }).join("");
  nav.querySelectorAll(".navitem").forEach(b=>b.onclick=()=>{ activeCohort = b.dataset.trip || null; render(); });

  const visible = trips.filter(t => !activeCohort || t.name===activeCohort);

  if (!visible.length){
    content.innerHTML = `<div class="empty" style="max-width:700px;text-align:left;padding:40px">
      <h3 style="text-align:center;margin-bottom:24px">Welcome to Travels</h3>
      <p style="margin-bottom:20px"><strong>Stop trips from blurring together.</strong> Create markdown files for each trip you take. The dashboard organizes them into a searchable map, timeline, and journal—works offline, goes everywhere with you.</p>
      
      <h4 style="margin:24px 0 12px;font-size:14px">How it works:</h4>
      <ol style="margin-left:20px;margin-bottom:20px">
        <li style="margin-bottom:8px">Create a <code style="background:var(--sand);padding:2px 6px;border-radius:4px">.md</code> file for each trip</li>
        <li style="margin-bottom:8px">Include: dates, places, people, highlights, restaurants, notes—whatever matters</li>
        <li style="margin-bottom:8px">Save the file (e.g., <code style="background:var(--sand);padding:2px 6px;border-radius:4px">Bali June 2025.md</code>)</li>
        <li>Click <strong>Load trip files</strong> above or drag them onto this page</li>
      </ol>

      <h4 style="margin:24px 0 12px;font-size:14px">Template: Basic trip</h4>
      <pre style="background:var(--sand);border:1px solid var(--line);border-radius:8px;padding:12px;overflow-x:auto;font-size:12px;line-height:1.4"><code># Trip: Bali, June 2025

- **Dates:** June 5-12, 2025
- **With:** Sarah, Alex
- **Places:**
  - Ubud, Indonesia (rice terraces, temples)
  - Seminyak, Indonesia (beaches, restaurants)
  - Canggu, Indonesia (surfing, nightlife)
- **Highlights:**
  - Sunrise hike to Mount Batur
  - Swimming in the waterfall
  - Perfect sunset at Tanah Lot
- **Restaurants:**
  - Karsa Kafe, Ubud (great nasi goreng)
  - Swept Away (riverside dinner)
- **Notes:** Would definitely go back. Sarah loved it.</code></pre>

      <h4 style="margin:24px 0 12px;font-size:14px">What the dashboard does:</h4>
      <ul style="margin-left:20px;margin-bottom:20px">
        <li><strong>Map view:</strong> Shows every place you've visited (uses "City, Country" format)</li>
        <li><strong>Timeline:</strong> Chronological view of all your trips</li>
        <li><strong>Trips:</strong> Full details of each trip with all your notes</li>
        <li><strong>Search:</strong> Find trips by place, date, person, or any detail</li>
        <li><strong>Stats:</strong> Countries visited, cities explored, trips taken</li>
        <li><strong>Offline:</strong> Works without WiFi once loaded</li>
      </ul>

      <h4 style="margin:24px 0 12px;font-size:14px">To use on your phone while traveling:</h4>
      <ol style="margin-left:20px;margin-bottom:20px">
        <li style="margin-bottom:8px">Save <code style="background:var(--sand);padding:2px 6px;border-radius:4px">travels-dashboard.html</code> to Google Drive or Dropbox</li>
        <li style="margin-bottom:8px">Also save your trip .md files there</li>
        <li style="margin-bottom:8px">On your phone, open the HTML file from Drive/Dropbox → browser opens it</li>
        <li style="margin-bottom:8px">Load your trips, search and browse offline</li>
        <li>Works with or without WiFi</li>
      </ol>

      <h4 style="margin:24px 0 12px;font-size:14px">Markdown tips:</h4>
      <ul style="margin-left:20px;margin-bottom:20px">
        <li><strong>Title:</strong> <code style="background:var(--sand);padding:2px 6px;border-radius:4px"># Trip: City, Month Year</code></li>
        <li><strong>Fields:</strong> <code style="background:var(--sand);padding:2px 6px;border-radius:4px">- **Dates:** June 5-12, 2025</code></li>
        <li><strong>Locations:</strong> Use "City, Country" format so they appear on the map</li>
        <li><strong>Add anything:</strong> Restaurants, budget, culture, hotels, language, lessons learned</li>
        <li><strong>Search works on everything:</strong> All your text is searchable</li>
        <li><strong>Edit anytime:</strong> Update and re-load a file to refresh</li>
      </ul>

      <p style="color:var(--muted);font-size:13px;margin-top:24px">
        <strong>Ready?</strong> Create a markdown file, add a trip (copy the template above), save it, then click <strong>Load trip files</strong>.
      </p>
    </div>`;
    countEl.textContent = "";
    return;
  }

  if (currentView === "map") renderMap(visible, content);
  else if (currentView === "timeline") renderTimeline(visible, content);
  else renderTripCards(visible, content);

  const shown = visible.length;
  countEl.textContent = `${shown} of ${trips.length} trips` + (query?` · matching "${query}"`:"");
}

function renderMap(visible, container){
  const allLocs = [];
  const locSet = new Set();
  visible.forEach(t=>{
    extractLocations(t).forEach(loc=>{
      const coords = geoCoords(loc.name);
      if (coords && !locSet.has(loc.name)){
        locSet.add(loc.name);
        allLocs.push({name: loc.name, coords, trips: []});
      }
    });
  });
  visible.forEach(t=>{
    extractLocations(t).forEach(loc=>{
      const found = allLocs.find(l=>l.name===loc.name);
      if (found && !found.trips.includes(t.name)) found.trips.push(t.name);
    });
  });

  if (!allLocs.length){
    container.innerHTML = `<div class="empty"><h3>No locations found</h3>Add locations in "City, Country" format to your trip files.</div>`;
    return;
  }

  const lats = allLocs.map(l=>l.coords[0]);
  const lons = allLocs.map(l=>l.coords[1]);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const padding = 0.1;
  const latRange = maxLat - minLat + padding;
  const lonRange = maxLon - minLon + padding;

  const width = 800, height = 400;
  const scale = Math.min(width / lonRange, height / latRange) * 0.9;
  const centerLat = (minLat + maxLat) / 2;
  const centerLon = (minLon + maxLon) / 2;

  const toX = lon => (lon - centerLon) * scale + width/2;
  const toY = lat => (centerLat - lat) * scale + height/2;

  let svg = `<svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">
    <defs><filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity=".15"/></filter></defs>
    <rect width="${width}" height="${height}" fill="var(--cream)"/>
    <g filter="url(#shadow)">`;
  
  allLocs.forEach(loc=>{
    const x = toX(loc.coords[1]);
    const y = toY(loc.coords[0]);
    svg += `<circle class="place-marker" cx="${x}" cy="${y}" r="6" data-loc="${esc(loc.name)}"/>
            <text class="place-label" x="${x}" y="${y+16}">${esc(loc.name.split(",")[0])}</text>`;
  });
  svg += `</g></svg>`;

  const stats = {
    countries: new Set(),
    cities: allLocs.length,
    days: 0,
  };
  visible.forEach(t=>{
    extractLocations(t).forEach(l=>{
      const parts = l.name.split(",");
      if (parts[1]) stats.countries.add(parts[1].trim());
    });
  });

  let html = `<div class="mapcanvas">${svg}</div>
    <div class="stats">
      <div class="stat"><div class="stat-num">${stats.countries.size}</div><div class="stat-label">Countries</div></div>
      <div class="stat"><div class="stat-num">${stats.cities}</div><div class="stat-label">Cities</div></div>
      <div class="stat"><div class="stat-num">${visible.length}</div><div class="stat-label">Trips</div></div>
    </div>`;

  container.innerHTML = html;
}

function renderTimeline(visible, container){
  const sorted = [...visible].sort((a,b)=>{
    const aDate = extractDates(a)[0] || "0";
    const bDate = extractDates(b)[0] || "0";
    return bDate.localeCompare(aDate);
  });

  let html = `<ul class="timeline">`;
  sorted.forEach(t=>{
    if (query && !matches(t.name) && !extractLocations(t).some(l=>matches(l.name))) return;
    const dates = extractDates(t);
    html += `<li>
      <div class="timeline-date">${dates.join(" – ") || "Date TBD"}</div>
      <div class="timeline-item"><strong>${inline(t.name)}</strong></div>`;
    const locs = extractLocations(t);
    if (locs.length) html += `<div class="timeline-item" style="font-size:12px;color:var(--muted);margin-top:2px">${locs.map(l=>inline(l.name)).join(", ")}</div>`;
    html += `</li>`;
  });
  html += `</ul>`;

  container.innerHTML = html;
}

function renderTripCards(visible, container){
  let html = "";
  visible.forEach(t=>{
    if (query && !matches(t.name) && !t.allText.includes(query.toLowerCase())) return;

    const dates = extractDates(t);
    const locs = extractLocations(t);
    const people = extractPeople(t);

    html += `<article class="trip">
      <div class="trip-head"><h2>${inline(t.name)}</h2></div>`;
    
    if (dates.length) html += `<div class="trip-dates"><span>📅</span><span>${dates.join(" – ")}</span></div>`;

    html += `<div class="trip-body">`;

    if (locs.length){
      html += `<div class="trip-section"><div class="section-title">Places</div>`;
      locs.forEach(loc=>{
        html += `<div class="location"><strong>${inline(loc.name)}</strong></div>`;
      });
      html += `</div>`;
    }

    if (people.length){
      html += `<div class="trip-section"><div class="section-title">With</div><ul class="items">`;
      people.forEach(p=>html += `<li>${inline(p)}</li>`);
      html += `</ul></div>`;
    }

    Object.entries(t.details).forEach(([key, val])=>{
      if (!["dates","places","with"].includes(key) && matches(val)){
        html += `<div class="trip-section"><div class="section-title">${inline(key)}</div><p>${inline(val)}</p></div>`;
      }
    });

    html += `</div></article>`;
  });

  container.innerHTML = html || `<div class="empty"><h3>No matches</h3>Try a different search.</div>`;
}

/* ================= loading ================= */
function ingest(text, name){
  const parsed = parseTrip(text, name);
  for (const t of parsed){
    const i = trips.findIndex(x=>x.name===t.name);
    i>=0 ? trips[i]=t : trips.push(t);
  }
  render();
}

document.getElementById("loadBtn").onclick = ()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = e=>{
  [...e.target.files].forEach(f=>{
    const r = new FileReader();
    r.onload = ()=>ingest(r.result, f.name);
    r.readAsText(f);
  });
  e.target.value = "";
};

let dragDepth=0;
addEventListener("dragenter",e=>{e.preventDefault();dragDepth++;document.body.classList.add("dragging");});
addEventListener("dragleave",e=>{if(--dragDepth<=0){dragDepth=0;document.body.classList.remove("dragging");}});
addEventListener("dragover",e=>e.preventDefault());
addEventListener("drop",e=>{
  e.preventDefault(); dragDepth=0; document.body.classList.remove("dragging");
  [...e.dataTransfer.files].forEach(f=>{
    const r=new FileReader(); r.onload=()=>ingest(r.result,f.name); r.readAsText(f);
  });
});

document.querySelectorAll(".tab").forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
    t.classList.add("on");
    currentView = t.dataset.view;
    render();
  };
});

const searchEl = document.getElementById("search");
searchEl.addEventListener("input", ()=>{ query = searchEl.value.trim(); render(); });
addEventListener("keydown", e=>{
  if (e.key==="/" && document.activeElement!==searchEl){ e.preventDefault(); searchEl.focus(); }
  if (e.key==="Escape" && document.activeElement===searchEl){ searchEl.value=""; query=""; render(); searchEl.blur(); }
});

render();
</script>
</body>
</html>
